<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Ernesto Segundo Paolini</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="hospital-title">
            HOSPITAL<br>
            ERNESTO<br>
            SEGUNDO<br>
            PAOLINI
        </div>
        
        <!-- Pantalla de Login -->
        <div id="login-screen" class="login-screen" style="display: none;">
            <div class="login-card">
                <h2 class="login-title">🔐 INICIAR SESIÓN</h2>
                <form id="login-form">
                    <input type="text" id="username" placeholder="USUARIO" class="login-input" required>
                    <input type="password" id="password" placeholder="CONTRASEÑA" class="login-input" required>
                    <div id="login-error" class="login-error" style="display: none;"></div>
                    <button type="submit" class="btn btn-primary login-submit">INGRESAR</button>
                </form>
                <button id="back-from-login-btn" class="btn btn-secondary back-btn">
                    ← VOLVER
                </button>
            </div>
        </div>
        
        <!-- Pantalla de empleados -->
        <div id="employees-screen" class="employees-screen" style="display: none;">
            <div class="employees-header">
                <h2 class="employees-title">📋 EMPLEADOS REGISTRADOS</h2>
                <button id="logout-btn" class="btn-logout">🚪 CERRAR SESIÓN</button>
            </div>
            <div id="employees-list" class="employees-list"></div>
            <button id="back-from-employees-btn" class="btn btn-secondary back-btn">
                ← VOLVER AL INICIO
            </button>
        </div>
        
        <!-- Botones principales -->
        <div class="buttons-container">
            <button id="loginButton" class="btn btn-primary">
                👤 VER EMPLEADOS
            </button>
            
            <button id="registerEmployeeBtn" class="btn btn-register">
                📝 REGISTRAR EMPLEADO
            </button>
            
            <button id="scanButton" class="btn btn-primary">
                📷 REGISTRAR ASISTENCIA
            </button>
            
            <button id="historyButton" class="btn btn-secondary">
                📋 HISTORIAL
            </button>
        </div>
        
        <!-- Pantalla de selección de acción -->
        <div id="action-selection-screen" class="action-selection-screen" style="display: none;">
            <h2 class="action-title">SELECCIONE ACCIÓN</h2>
            <div class="action-buttons">
                <button id="entry-btn" class="btn action-btn entry-btn">
                    🚪 ENTRADA
                </button>
                <button id="exit-btn" class="btn action-btn exit-btn">
                    🚶 SALIDA
                </button>
            </div>
            <button id="back-from-action-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de historial -->
        <div id="history-screen" class="history-screen" style="display: none;">
            <h2 class="history-title">ÚLTIMOS REGISTROS</h2>
            <div id="history-list" class="history-list"></div>
            <button id="back-from-history-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de registro exitoso -->
        <div id="register-screen" class="register-screen" style="display: none;">
            <div id="register-result" class="result-box"></div>
            <button id="back-from-register-btn" class="btn btn-secondary back-btn" style="margin-top: 15px;">
                ← VOLVER
            </button>
        </div>
        
        <!-- Video para escaneo -->
        <div id="video-container" style="display: none;">
            <video id="qr-video" playsinline></video>
            <canvas id="qr-canvas" style="display: none;"></canvas>
            <div class="video-controls">
                <button id="cancel-scan-btn" class="btn btn-secondary">CANCELAR</button>
            </div>
        </div>
        
        <!-- Resultado del escaneo -->
        <div id="result-container" style="display: none;">
            <div id="scan-result" class="result-box"></div>
        </div>
        
    </div>
    
    <script src="app.js"></script>
</body>
</html>
