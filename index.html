<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hospital Ernesto Segundo Paolini - Control de Asistencia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Título del hospital -->
        <div class="hospital-title">
            HOSPITAL<br>
            ERNESTO<br>
            SEGUNDO<br>
            PAOLINI
        </div>
        
        <!-- Botones principales -->
        <div class="buttons-container">
            <button id="loginButton" class="btn btn-primary">
                INICIAR SESION
            </button>
            
            <button id="scanButton" class="btn btn-primary">
                ESCANEAR
            </button>
            
            <button id="historyButton" class="btn btn-secondary">
                HISTORIAL
            </button>
        </div>
        
        <!-- Pantalla de selección de acción (Entrada/Salida) -->
        <div id="action-selection-screen" class="action-selection-screen" style="display: none;">
            <h2 class="action-title">SELECCIONE ACCIÓN</h2>
            <div class="action-buttons">
                <button id="entry-btn" class="btn action-btn entry-btn">
                    ENTRADA
                </button>
                <button id="exit-btn" class="btn action-btn exit-btn">
                    SALIDA
                </button>
            </div>
            <button id="back-from-action-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de menú de inicio de sesión -->
        <div id="login-menu-screen" class="login-menu-screen" style="display: none;">
            <h2 class="login-title">MENÚ ADMINISTRADOR</h2>
            <div class="login-buttons">
                <button id="register-employee-btn" class="btn login-menu-btn register-btn">
                    📝 REGISTRAR EMPLEADO
                </button>
                <button id="view-employees-btn" class="btn login-menu-btn view-btn">
                    👥 VER EMPLEADOS
                </button>
            </div>
            <button id="back-from-login-menu-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de lista de empleados -->
        <div id="employees-list-screen" class="employees-list-screen" style="display: none;">
            <h2 class="employees-title">EMPLEADOS REGISTRADOS</h2>
            <div id="employees-list-container" class="employees-list-container"></div>
            <button id="back-from-employees-list-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de historial -->
        <div id="history-screen" class="history-screen" style="display: none;">
            <h2 class="history-title">ÚLTIMOS REGISTROS</h2>
            <div id="history-list" class="history-list"></div>
            <button id="back-from-history-btn" class="btn btn-secondary back-btn">
                ← VOLVER
            </button>
        </div>
        
        <!-- Video para escaneo -->
        <div id="video-container" style="display: none;">
            <video id="qr-video" playsinline></video>
            <canvas id="qr-canvas" style="display: none;"></canvas>
            <div class="video-controls">
                <button id="cancel-scan-btn" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
        
        <!-- Resultado del escaneo -->
        <div id="result-container" style="display: none;">
            <div id="scan-result" class="result-box"></div>
        </div>
        
    </div>
    
    <script src="app.js"></script>
</body>
</html>
